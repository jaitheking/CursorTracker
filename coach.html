<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coach</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h2>🧠 AI Performance Coach</h2>

        <!-- Section for manual Coros / Strength logging -->
        <!-- Insert inside coach.html under the Vectorize panel -->
        <div class="panel">
            <h3>1. Log Workout (Auto-Parse or Manual)</h3>

            <label for="activityType">Activity Type:</label>
            <select id="activityType">
                <option value="Running">Running (Coros File / Data)</option>
                <option value="Strength">Strength Training</option>
            </select>

            <!-- NEW: Direct File Upload Zone -->
            <div id="dropZone" class="file-drop-zone"
                style="border: 2px dashed #ff5722; padding: 20px; text-align: center; margin: 15px 0; cursor: pointer; border-radius: 8px;">
                <p>📁 Drag & Drop your Coros <strong>.tcx</strong> or <strong>.gpx</strong> file here</p>
                <p><small>or click to browse files from your device</small></p>
                <input type="file" id="corosFileInput" accept=".tcx,.gpx" style="display: none;">
            </div>

            <textarea id="logDetails" rows="5"
                placeholder="Parsed workout metrics or manual notes will appear here..."></textarea>

            <button id="saveLogBtn" class="main-btn">💾 Save to Vector DB</button>
            <p id="logStatus"></p>
        </div>

        <!-- Section for interacting with the Coach -->
        <div class="panel" style="margin-top: 20px;">
            <h3>2. Request Coaching Plan</h3>
            <textarea id="coachPrompt" rows="3"
                placeholder="e.g., How should I structure my run tomorrow based on my last session?"></textarea>
            <button id="generatePlanBtn" class="main-btn">⚡ Generate Plan</button>
        </div>

        <div id="coachOutputPanel" class="hidden">
            <h3>📋 Your Plan</h3>
            <div id="coachPlanContent" style="white-space: pre-wrap;"></div>
        </div>
    </div>

    <script src="scripts/coach.js"></script>
</body>

</html>
