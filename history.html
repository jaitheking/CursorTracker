<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout History — Jaiprashanth</title>
    <meta name="description" content="Calendar view of all workout history. Import, inspect, and manage past sessions.">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff5722">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

<div class="container">
    <div class="header">
        <h2>📅 WORKOUT HISTORY</h2>
        <div class="subtitle">Athlete: Jaiprashanth</div>
    </div>

    <a href="/index.html" class="nav-link">⬅️ Back to Dashboard</a>

    <div class="import-zone">
        <label for="fileImporter" class="import-label">📥 Sync Older Logs from Device</label>
        <input type="file" id="fileImporter" accept=".txt" multiple style="display: none;">
        <button type="button" class="secondary-btn" onclick="document.getElementById('fileImporter').click()">Select Log Files</button>
        <span id="importStatus" class="import-status"></span>
    </div>

    <div class="calendar-controls">
        <button type="button" id="prevMonthBtn" class="control-btn">◀</button>
        <h3 id="calendarMonthTitle">June 2026</h3>
        <button type="button" id="nextMonthBtn" class="control-btn">▶</button>
    </div>

    <div class="calendar-container">
        <div class="weekdays-grid">
            <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
        </div>
        <div id="calendarDaysGrid" class="days-grid"></div>
    </div>

    <div id="inspectorPanel" class="inspector-panel hidden">
        <h3 id="inspectorHeader">Session Management</h3>
        <div id="inspectorContent"></div>
    </div>

    <button type="button" id="clearHistoryBtn" class="danger-btn hidden">🗑️ Wipe History Cache</button>

    <footer class="app-footer">
        <p>© <span id="currentYear"></span> · Developed with ⚡ by <strong>Jaiprashanth</strong></p>
    </footer>
</div>

<script src="/scripts/history.js" defer></script>
<script src="/scripts/sw-register.js" defer></script>
<script>
    (function() {
        const t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
            btn?.addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                const next = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                btn.textContent = next === 'dark' ? '☀️' : '🌙';
            });
        });
    })();
</script>
</body>
</html>
