<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Performance Tracker - Jaiprashanth</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff5722">

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h2>⚡ CURSOR PERFORMANCE</h2>
    </div>

    <form id="logForm">
        <label for="logDate">Workout Date</label>
        <input type="date" id="logDate" required>

        <label for="workoutType">Workout Type</label>
        <select id="workoutType">
            <option value="Running">🏃‍♂️ Running Session</option>
            <option value="Gym">🏋️‍♂️ Gym / Strength</option>
        </select>

        <div id="runningMetrics">
            <label for="runDist">Distance (km)</label>
            <input type="number" id="runDist" step="0.01" placeholder="e.g., 10.00">
            <div class="preset-container">
                <button type="button" class="preset-btn preset-dist" data-val="5">5k</button>
                <button type="button" class="preset-btn preset-dist" data-val="10">10k</button>
                <button type="button" class="preset-btn preset-dist" data-val="12">12k</button>
                <button type="button" class="preset-btn preset-dist" data-val="15">15k</button>
                <button type="button" class="preset-btn preset-dist" data-val="21.1">HM</button>
            </div>

            <label for="avgPace">Average Pace (/km)</label>
            <input type="text" id="avgPace" placeholder="e.g., 6:56">
            <div class="preset-container">
                <button type="button" class="preset-btn preset-pace" data-val="6:56">6:56 (Baseline)</button>
                <button type="button" class="preset-btn preset-pace" data-val="6:30">6:30</button>
                <button type="button" class="preset-btn preset-pace" data-val="6:00">6:00</button>
            </div>
        </div>

        <div id="gymMetrics" class="hidden">
            <label for="gymFocus">Focus / Split</label>
            <input type="text" id="gymFocus" placeholder="e.g., Lower Body, Core">
            <div class="preset-container">
                <button type="button" class="preset-btn preset-gym" data-val="Lower Body & Stability">Lower Body</button>
                <button type="button" class="preset-btn preset-gym" data-val="Upper Body & Core">Upper Body</button>
                <button type="button" class="preset-btn preset-gym" data-val="Full Body Kinetic">Full Body</button>
            </div>
        </div>

        <label>Body Composition</label>
        <div class="grid-3">
            <input type="number" id="weight" step="0.1" placeholder="Wt (kg)">
            <input type="number" id="muscle" step="0.1" placeholder="Musc (kg)">
            <input type="number" id="bf" step="0.1" placeholder="BF %">
        </div>

        <label for="description">Workout Details / Reps</label>
        <textarea id="description" rows="3" placeholder="Interval details, weight lifted, etc..."></textarea>

        <label for="comments">Condition & Comments</label>
        <textarea id="comments" rows="2" placeholder="Body feel, energy levels, sleep quality..."></textarea>

        <button type="button" class="main-btn" id="generateBtn">Generate Log</button>
        
        <div class="action-group hidden" id="actionGroup">
            <button type="button" class="secondary" id="copyBtn">🚀 Copy</button>
            <button type="button" class="secondary" id="saveBtn">💾 Save .txt</button>
        </div>
    </form>

    <div id="output" class="hidden"></div>

    <footer class="app-footer">
        <p>© <span id="currentYear"></span> · Developed with ⚡ by <strong>Jaiprashanth</strong></p>
    </footer>
</div>

<script src="/scripts/app.js" defer></script>
<script src="/scripts/sw-register.js" defer></script>
</body>
</html>
